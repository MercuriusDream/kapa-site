<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>한국ADHD환우회 KAPA — ADHD 환자의 치료권 보장을 위한 비영리단체</title>
    <meta
      name="description"
      content="한국ADHD환우회 KAPA는 ADHD 환자의 권익 보호, 인식 개선, 치료권 보장을 위해 활동하는 비영리단체입니다."
    />
    <meta name="theme-color" content="#1c3d6e" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0e1a2c" media="(prefers-color-scheme: dark)" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="ko_KR" />
    <meta property="og:site_name" content="KAPA" />
    <meta property="og:title" content="한국ADHD환우회 KAPA" />
    <meta
      property="og:description"
      content="ADHD 환자가 필요한 치료를 제때, 충분히, 낙인 없이 받을 수 있도록 목소리를 모으는 비영리단체."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link
      rel="preconnect"
      href="https://cdn.jsdelivr.net"
      crossorigin
    />
    <link
      rel="preload"
      as="style"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"
    />
    <script>
      const theme = localStorage.getItem('kapa-theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
